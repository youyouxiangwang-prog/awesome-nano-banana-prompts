<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Nano Banana Pro Prompts - 小红书风格</title>
    <style>
        /* ============================
           CSS Variables
           ============================ */
        :root {
            --primary: #FF6B6B;
            --secondary: #C44569;
            --accent: #FFD93D;
            --bg: #FFF9F5;
            --card-bg: #FFFFFF;
            --text-primary: #2D2D2D;
            --text-secondary: #666666;
            --success: #6BCB77;
            --border: #EEEEEE;
            --shadow: rgba(0, 0, 0, 0.08);
            --shadow-hover: rgba(0, 0, 0, 0.15);
        }

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: "PingFang SC", "Hiragino Sans GB", "Microsoft YaHei", sans-serif;
            background: var(--bg);
            color: var(--text-primary);
            line-height: 1.6;
            min-height: 100vh;
        }

        /* Header */
        .header {
            position: sticky;
            top: 0;
            z-index: 100;
            background: linear-gradient(135deg, var(--primary) 0%, var(--secondary) 100%);
            padding: 20px;
            box-shadow: 0 4px 20px var(--shadow-hover);
        }

        .header-content {
            max-width: 1400px;
            margin: 0 auto;
            display: flex;
            align-items: center;
            justify-content: space-between;
            flex-wrap: wrap;
            gap: 16px;
        }

        .logo {
            display: flex;
            align-items: center;
            gap: 12px;
            color: white;
            font-size: 1.5rem;
            font-weight: 600;
        }

        .logo-icon { font-size: 2rem; }

        .search-box {
            display: flex;
            gap: 8px;
            flex: 1;
            max-width: 400px;
        }

        .search-input {
            flex: 1;
            padding: 12px 16px;
            border: none;
            border-radius: 25px;
            font-size: 1rem;
            outline: none;
            background: rgba(255, 255, 255, 0.95);
        }

        .filter-select {
            padding: 12px 20px;
            border: none;
            border-radius: 25px;
            font-size: 0.95rem;
            background: rgba(255, 255, 255, 0.95);
            cursor: pointer;
            outline: none;
        }

        /* Main Content */
        .main {
            max-width: 1400px;
            margin: 0 auto;
            padding: 24px 16px;
        }

        .masonry {
            column-count: 4;
            column-gap: 16px;
        }

        @media (max-width: 1200px) { .masonry { column-count: 3; } }
        @media (max-width: 768px) { .masonry { column-count: 2; } }
        @media (max-width: 480px) { .masonry { column-count: 1; } }

        /* Card */
        .card {
            break-inside: avoid;
            margin-bottom: 16px;
            background: var(--card-bg);
            border-radius: 16px;
            overflow: hidden;
            box-shadow: 0 4px 12px var(--shadow);
            transition: transform 0.2s ease, box-shadow 0.2s ease;
        }

        .card:hover {
            transform: translateY(-4px);
            box-shadow: 0 8px 24px var(--shadow-hover);
        }

        /* Image Gallery */
        .card-image-wrapper {
            position: relative;
            background: #f5f5f5;
        }

        .image-gallery {
            display: flex;
            overflow-x: auto;
            scroll-snap-type: x mandatory;
            -webkit-overflow-scrolling: touch;
            scrollbar-width: none;
        }

        .image-gallery::-webkit-scrollbar { display: none; }

        .gallery-image {
            flex: 0 0 100%;
            width: 100%;
            min-height: 200px;
            max-height: 350px;
            object-fit: cover;
            scroll-snap-align: start;
            background: #e0e0e0;
        }

        .image-nav {
            position: absolute;
            top: 50%;
            transform: translateY(-50%);
            background: rgba(255,255,255,0.9);
            border: none;
            border-radius: 50%;
            width: 32px;
            height: 32px;
            cursor: pointer;
            font-size: 1rem;
            display: flex;
            align-items: center;
            justify-content: center;
            opacity: 0;
            transition: opacity 0.2s;
            z-index: 5;
        }

        .card-image-wrapper:hover .image-nav { opacity: 1; }
        .image-nav:hover { background: white; }
        .image-nav.prev { left: 8px; }
        .image-nav.next { right: 8px; }

        .image-dots {
            position: absolute;
            bottom: 8px;
            left: 50%;
            transform: translateX(-50%);
            display: flex;
            gap: 4px;
            background: rgba(0,0,0,0.4);
            padding: 4px 8px;
            border-radius: 10px;
        }

        .image-dot {
            width: 6px;
            height: 6px;
            border-radius: 50%;
            background: rgba(255,255,255,0.5);
            cursor: pointer;
        }

        .image-dot.active {
            background: white;
        }

        .image-count-badge {
            position: absolute;
            top: 8px;
            right: 8px;
            background: rgba(0,0,0,0.6);
            color: white;
            padding: 4px 10px;
            border-radius: 12px;
            font-size: 0.75rem;
            display: flex;
            align-items: center;
            gap: 4px;
        }

        /* Card Content */
        .card-content { padding: 16px; }

        .card-tags {
            display: flex;
            flex-wrap: wrap;
            gap: 6px;
            margin-bottom: 12px;
        }

        .tag {
            padding: 4px 10px;
            background: #FFF0F0;
            color: var(--primary);
            border-radius: 12px;
            font-size: 0.75rem;
            font-weight: 500;
        }

        .card-title {
            font-size: 1rem;
            font-weight: 600;
            margin-bottom: 8px;
            line-height: 1.4;
            display: -webkit-box;
            -webkit-line-clamp: 2;
            -webkit-box-orient: vertical;
            overflow: hidden;
        }

        .card-description {
            font-size: 0.9rem;
            color: var(--text-secondary);
            margin-bottom: 12px;
            line-height: 1.5;
            display: -webkit-box;
            -webkit-line-clamp: 3;
            -webkit-box-orient: vertical;
            overflow: hidden;
        }

        .prompt-box {
            background: #F8F8F8;
            border-radius: 10px;
            padding: 12px;
            margin-bottom: 12px;
            max-height: 100px;
            overflow-y: auto;
            font-size: 0.85rem;
            line-height: 1.6;
            font-family: "SF Mono", "Monaco", monospace;
        }

        .prompt-box::-webkit-scrollbar { width: 4px; }
        .prompt-box::-webkit-scrollbar-thumb { background: #ddd; border-radius: 2px; }

        .card-actions {
            display: flex;
            gap: 8px;
        }

        .btn {
            flex: 1;
            padding: 10px 16px;
            border: none;
            border-radius: 20px;
            font-size: 0.9rem;
            font-weight: 500;
            cursor: pointer;
            transition: all 0.2s ease;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 6px;
        }

        .btn-copy {
            background: var(--primary);
            color: white;
        }

        .btn-copy:hover { background: #ff5252; }
        .btn-copy:active { transform: scale(0.95); }
        .btn-copy.success { background: var(--success); }

        .btn-favorite {
            background: #FFF5F5;
            color: var(--primary);
            flex: 0 0 auto;
            padding: 10px 14px;
        }

        .btn-favorite:hover { background: #FFE5E5; }
        .btn-favorite.active { background: var(--primary); color: white; }

        /* Lightbox */
        .lightbox {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(0,0,0,0.95);
            z-index: 1000;
            display: none;
            align-items: center;
            justify-content: center;
        }

        .lightbox.active { display: flex; }

        .lightbox-content {
            position: relative;
            max-width: 90%;
            max-height: 90%;
        }

        .lightbox-image {
            max-width: 100%;
            max-height: 85vh;
            object-fit: contain;
            border-radius: 8px;
        }

        .lightbox-close {
            position: absolute;
            top: -40px;
            right: 0;
            background: none;
            border: none;
            color: white;
            font-size: 2rem;
            cursor: pointer;
        }

        .lightbox-nav {
            position: absolute;
            top: 50%;
            transform: translateY(-50%);
            background: rgba(255,255,255,0.2);
            border: none;
            color: white;
            font-size: 2rem;
            padding: 20px 15px;
            cursor: pointer;
            border-radius: 8px;
        }

        .lightbox-nav:hover { background: rgba(255,255,255,0.3); }
        .lightbox-nav.prev { left: -60px; }
        .lightbox-nav.next { right: -60px; }

        .lightbox-counter {
            position: absolute;
            bottom: -30px;
            left: 50%;
            transform: translateX(-50%);
            color: white;
            font-size: 1rem;
        }

        /* Toast */
        .toast {
            position: fixed;
            bottom: 30px;
            left: 50%;
            transform: translateX(-50%) translateY(100px);
            background: var(--success);
            color: white;
            padding: 14px 28px;
            border-radius: 25px;
            font-size: 1rem;
            font-weight: 500;
            box-shadow: 0 4px 20px rgba(0, 0, 0, 0.2);
            z-index: 1000;
            opacity: 0;
            transition: all 0.3s ease;
            display: flex;
            align-items: center;
            gap: 8px;
        }

        .toast.show {
            transform: translateX(-50%) translateY(0);
            opacity: 1;
        }

        .toast.error { background: #FF6B6B; }

        /* Empty State */
        .empty-state {
            text-align: center;
            padding: 60px 20px;
            color: var(--text-secondary);
        }

        .empty-state-icon { font-size: 4rem; margin-bottom: 16px; }

        /* Footer */
        .footer {
            text-align: center;
            padding: 40px 20px;
            color: var(--text-secondary);
            font-size: 0.9rem;
        }

        .footer a {
            color: var(--primary);
            text-decoration: none;
        }

        /* Responsive */
        @media (max-width: 600px) {
            .header-content { flex-direction: column; align-items: stretch; }
            .search-box { max-width: 100%; }
            .logo { justify-content: center; }
            .lightbox-nav { padding: 15px 10px; font-size: 1.5rem; }
            .lightbox-nav.prev { left: 5px; }
            .lightbox-nav.next { right: 5px; }
        }
    </style>
</head>
<body>
    <header class="header">
        <div class="header-content">
            <div class="logo">
                <span class="logo-icon">🍌</span>
                <span>Nano Banana Pro Prompts</span>
            </div>
            <div class="search-box">
                <input type="text" class="search-input" id="searchInput" placeholder="🔍 搜索 Prompts...">
                <select class="filter-select" id="languageFilter">
                    <option value="all">全部语言</option>
                    <option value="ZH">🇨🇳 中文</option>
                    <option value="EN">🇺🇸 English</option>
                    <option value="JA">🇯🇵 日本語</option>
                    <option value="DE">🇩🇪 Deutsch</option>
                </select>
            </div>
        </div>
    </header>

    <main class="main">
        <div class="masonry" id="promptsGrid"></div>
        <div class="empty-state" id="emptyState" style="display: none;">
            <div class="empty-state-icon">🔍</div>
            <p class="empty-state-text">没有找到相关 Prompts</p>
        </div>
    </main>

    <footer class="footer">
        <p>数据来源: <a href="https://github.com/YouMind-OpenLab/awesome-nano-banana-pro-prompts" target="_blank">awesome-nano-banana-pro-prompts</a></p>
        <p style="margin-top: 8px;">由 AI 整理 | 仅供学习使用</p>
    </footer>

    <!-- Lightbox -->
    <div class="lightbox" id="lightbox">
        <div class="lightbox-content">
            <button class="lightbox-close" onclick="closeLightbox()">×</button>
            <button class="lightbox-nav prev" onclick="lightboxPrev()">‹</button>
            <img class="lightbox-image" id="lightboxImage" src="" alt="">
            <button class="lightbox-nav next" onclick="lightboxNext()">›</button>
            <div class="lightbox-counter" id="lightboxCounter"></div>
        </div>
    </div>

    <!-- Toast -->
    <div class="toast" id="toast"></div>

    <script src="data.js"></script>
    <script>
        // State
        let favorites = JSON.parse(localStorage.getItem('nanoPromptFavorites') || '[]');
        let currentLightboxPrompt = null;
        let currentLightboxIndex = 0;

        // DOM Elements
        const grid = document.getElementById('promptsGrid');
        const searchInput = document.getElementById('searchInput');
        const languageFilter = document.getElementById('languageFilter');
        const emptyState = document.getElementById('emptyState');
        const toast = document.getElementById('toast');
        const lightbox = document.getElementById('lightbox');
        const lightboxImage = document.getElementById('lightboxImage');
        const lightboxCounter = document.getElementById('lightboxCounter');

        // Show toast
        function showToast(message, isError = false) {
            toast.textContent = message;
            toast.className = 'toast' + (isError ? ' error' : '');
            toast.classList.add('show');
            setTimeout(() => toast.classList.remove('show'), 2000);
        }

        // Copy prompt
        async function copyPrompt(prompt, btn) {
            try {
                await navigator.clipboard.writeText(prompt);
                btn.innerHTML = '✓ 已复制';
                btn.classList.add('success');
                showToast('已复制到剪贴板 ✨');
                setTimeout(() => {
                    btn.innerHTML = '📋 复制';
                    btn.classList.remove('success');
                }, 2000);
            } catch (err) {
                showToast('复制失败，请手动选择', true);
            }
        }

        // Toggle favorite
        function toggleFavorite(id, btn) {
            const index = favorites.indexOf(id);
            if (index > -1) {
                favorites.splice(index, 1);
                btn.classList.remove('active');
            } else {
                favorites.push(id);
                btn.classList.add('active');
                showToast('已添加到收藏 💜');
            }
            localStorage.setItem('nanoPromptFavorites', JSON.stringify(favorites));
        }

        // Lightbox functions
        function openLightbox(prompt, index) {
            currentLightboxPrompt = prompt;
            currentLightboxIndex = index;
            updateLightboxImage();
            lightbox.classList.add('active');
            document.body.style.overflow = 'hidden';
        }

        function closeLightbox() {
            lightbox.classList.remove('active');
            document.body.style.overflow = '';
        }

        function lightboxPrev() {
            if (currentLightboxPrompt && currentLightboxPrompt.images.length > 1) {
                currentLightboxIndex = (currentLightboxIndex - 1 + currentLightboxPrompt.images.length) % currentLightboxPrompt.images.length;
                updateLightboxImage();
            }
        }

        function lightboxNext() {
            if (currentLightboxPrompt && currentLightboxPrompt.images.length > 1) {
                currentLightboxIndex = (currentLightboxIndex + 1) % currentLightboxPrompt.images.length;
                updateLightboxImage();
            }
        }

        function updateLightboxImage() {
            if (currentLightboxPrompt) {
                lightboxImage.src = currentLightboxPrompt.images[currentLightboxIndex];
                lightboxCounter.textContent = `${currentLightboxIndex + 1} / ${currentLightboxPrompt.images.length}`;
            }
        }

        // Keyboard navigation for lightbox
        document.addEventListener('keydown', (e) => {
            if (lightbox.classList.contains('active')) {
                if (e.key === 'Escape') closeLightbox();
                if (e.key === 'ArrowLeft') lightboxPrev();
                if (e.key === 'ArrowRight') lightboxNext();
            }
        });

        // Click outside to close lightbox
        lightbox.addEventListener('click', (e) => {
            if (e.target === lightbox) closeLightbox();
        });

        // Create card HTML
        function createCard(prompt) {
            const isFavorite = favorites.includes(prompt.id);
            const imageCount = prompt.images.length;

            // Generate dots HTML
            const dotsHtml = prompt.images.map((_, i) => 
                `<div class="image-dot ${i === 0 ? 'active' : ''}" data-index="${i}"></div>`
            ).join('');

            // Generate images HTML
            const imagesHtml = prompt.images.map((img, i) => 
                `<img class="gallery-image" src="${img}" alt="${prompt.title} - Image ${i + 1}" data-index="${i}">`
            ).join('');

            return `
                <article class="card" data-id="${prompt.id}">
                    <div class="card-image-wrapper">
                        <div class="image-gallery" id="gallery-${prompt.id}">
                            ${imagesHtml}
                        </div>
                        ${prompt.images.length > 1 ? `
                            <button class="image-nav prev" onclick="slideGallery('${prompt.id}', -1)">‹</button>
                            <button class="image-nav next" onclick="slideGallery('${prompt.id}', 1)">›</button>
                            <div class="image-dots">${dotsHtml}</div>
                        ` : ''}
                        <div class="image-count-badge">📷 ${imageCount}</div>
                        <div class="image-count-badge" style="top:8px;left:8px;right:auto;">
                            <span style="cursor:pointer" onclick="openLightbox(prompts.find(p=>p.id===${prompt.id}), 0)">🔍 点击预览</span>
                        </div>
                    </div>
                    <div class="card-content">
                        <div class="card-tags">
                            ${prompt.tags.map(tag => `<span class="tag">#${tag}</span>`).join('')}
                        </div>
                        <h3 class="card-title">${prompt.title}</h3>
                        <p class="card-description">${prompt.description}</p>
                        <div class="prompt-box">${prompt.prompt}</div>
                        <div class="card-actions">
                            <button class="btn btn-copy" onclick="copyPrompt(\`${prompt.prompt.replace(/`/g, '\\`').replace(/\$/g, '\\$')}\`, this)">
                                📋 复制
                            </button>
                            <button class="btn btn-favorite ${isFavorite ? 'active' : ''}" onclick="toggleFavorite(${prompt.id}, this)">
                                ${isFavorite ? '❤️' : '🤍'}
                            </button>
                        </div>
                    </div>
                </article>
            `;
        }

        // Slide gallery
        function slideGallery(galleryId, direction) {
            const gallery = document.getElementById(`gallery-${galleryId}`);
            const images = gallery.querySelectorAll('.gallery-image');
            const dots = gallery.parentElement.querySelectorAll('.image-dot');
            const currentIndex = Array.from(images).findIndex(img => img.src === img.src); // This won't work properly
            
            // Find active image
            let activeIndex = 0;
            images.forEach((img, i) => {
                if (img.classList.contains('active')) activeIndex = i;
            });

            // Update active index
            activeIndex = (activeIndex + direction + images.length) % images.length;
            
            // Scroll to image
            images[activeIndex].scrollIntoView({ behavior: 'smooth', inline: 'start', block: 'nearest' });
        }

        // Render prompts
        function renderPrompts() {
            const searchTerm = searchInput.value.toLowerCase();
            const language = languageFilter.value;

            const filtered = prompts.filter(prompt => {
                const matchesSearch = 
                    prompt.title.toLowerCase().includes(searchTerm) ||
                    prompt.description.toLowerCase().includes(searchTerm) ||
                    prompt.prompt.toLowerCase().includes(searchTerm);
                const matchesLanguage = language === 'all' || prompt.language === language;
                return matchesSearch && matchesLanguage;
            });

            if (filtered.length === 0) {
                grid.innerHTML = '';
                emptyState.style.display = 'block';
            } else {
                emptyState.style.display = 'none';
                grid.innerHTML = filtered.map(createCard).join('');

                // Setup gallery navigation
                document.querySelectorAll('.image-gallery').forEach(gallery => {
                    const images = gallery.querySelectorAll('.gallery-image');
                    const dots = gallery.parentElement.querySelectorAll('.image-dot');

                    // Handle scroll
                    gallery.addEventListener('scroll', () => {
                        const scrollLeft = gallery.scrollLeft;
                        const imageWidth = gallery.offsetWidth;
                        const activeIndex = Math.round(scrollLeft / imageWidth);
                        
                        dots.forEach((dot, i) => {
                            dot.classList.toggle('active', i === activeIndex);
                        });
                        images.forEach((img, i) => {
                            img.classList.toggle('active', i === activeIndex);
                        });
                    });

                    // Handle dot click
                    dots.forEach((dot, i) => {
                        dot.addEventListener('click', () => {
                            images[i].scrollIntoView({ behavior: 'smooth', inline: 'start', block: 'nearest' });
                        });
                    });

                    // Click image to open lightbox
                    images.forEach((img, i) => {
                        img.style.cursor = 'pointer';
                        img.addEventListener('click', () => {
                            const card = gallery.closest('.card');
                            const id = parseInt(card.dataset.id);
                            const prompt = prompts.find(p => p.id === id);
                            openLightbox(prompt, i);
                        });
                    });
                });
            }
        }

        // Debounce
        function debounce(func, wait) {
            let timeout;
            return function(...args) {
                clearTimeout(timeout);
                timeout = setTimeout(() => func.apply(this, args), wait);
            };
        }

        // Event listeners
        searchInput.addEventListener('input', debounce(renderPrompts, 300));
        languageFilter.addEventListener('change', renderPrompts);

        // Initial render
        renderPrompts();
    </script>
</body>
</html>
