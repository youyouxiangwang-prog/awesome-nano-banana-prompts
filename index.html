<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Nano Banana Pro Prompts - 小红书风格</title>
    <style>
        /* ============================
           CSS Variables
           ============================ */
        :root {
            --primary: #FF6B6B;
            --secondary: #C44569;
            --accent: #FFD93D;
            --bg: #FFF9F5;
            --card-bg: #FFFFFF;
            --text-primary: #2D2D2D;
            --text-secondary: #666666;
            --success: #6BCB77;
            --border: #EEEEEE;
            --shadow: rgba(0, 0, 0, 0.08);
            --shadow-hover: rgba(0, 0, 0, 0.15);
        }

        /* ============================
           Reset & Base
           ============================ */
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: "PingFang SC", "Hiragino Sans GB", "Microsoft YaHei", sans-serif;
            background: var(--bg);
            color: var(--text-primary);
            line-height: 1.6;
            min-height: 100vh;
        }

        /* ============================
           Header
           ============================ */
        .header {
            position: sticky;
            top: 0;
            z-index: 100;
            background: linear-gradient(135deg, var(--primary) 0%, var(--secondary) 100%);
            padding: 20px;
            box-shadow: 0 4px 20px var(--shadow-hover);
        }

        .header-content {
            max-width: 1400px;
            margin: 0 auto;
            display: flex;
            align-items: center;
            justify-content: space-between;
            flex-wrap: wrap;
            gap: 16px;
        }

        .logo {
            display: flex;
            align-items: center;
            gap: 12px;
            color: white;
            font-size: 1.5rem;
            font-weight: 600;
        }

        .logo-icon {
            font-size: 2rem;
        }

        .search-box {
            display: flex;
            gap: 8px;
            flex: 1;
            max-width: 400px;
        }

        .search-input {
            flex: 1;
            padding: 12px 16px;
            border: none;
            border-radius: 25px;
            font-size: 1rem;
            outline: none;
            background: rgba(255, 255, 255, 0.95);
            color: var(--text-primary);
        }

        .search-input::placeholder {
            color: #999;
        }

        .filter-select {
            padding: 12px 20px;
            border: none;
            border-radius: 25px;
            font-size: 0.95rem;
            background: rgba(255, 255, 255, 0.95);
            color: var(--text-primary);
            cursor: pointer;
            outline: none;
        }

        /* ============================
           Main Content
           ============================ */
        .main {
            max-width: 1400px;
            margin: 0 auto;
            padding: 24px 16px;
        }

        .masonry {
            column-count: 4;
            column-gap: 16px;
        }

        @media (max-width: 1200px) {
            .masonry { column-count: 3; }
        }

        @media (max-width: 768px) {
            .masonry { column-count: 2; }
        }

        @media (max-width: 480px) {
            .masonry { column-count: 1; }
        }

        /* ============================
           Prompt Card
           ============================ */
        .card {
            break-inside: avoid;
            margin-bottom: 16px;
            background: var(--card-bg);
            border-radius: 16px;
            overflow: hidden;
            box-shadow: 0 4px 12px var(--shadow);
            transition: transform 0.2s ease, box-shadow 0.2s ease;
        }

        .card:hover {
            transform: translateY(-4px);
            box-shadow: 0 8px 24px var(--shadow-hover);
        }

        .card-image-wrapper {
            position: relative;
            background: #f5f5f5;
            overflow: hidden;
        }

        .card-image {
            width: 100%;
            display: block;
            opacity: 0;
            transition: opacity 0.3s ease;
        }

        .card-image.loaded {
            opacity: 1;
        }

        .card-image-skeleton {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: linear-gradient(90deg, #f0f0f0 25%, #e0e0e0 50%, #f0f0f0 75%);
            background-size: 200% 100%;
            animation: shimmer 1.5s infinite;
        }

        .card-image.loaded + .card-image-skeleton {
            display: none;
        }

        @keyframes shimmer {
            0% { background-position: 200% 0; }
            100% { background-position: -200% 0; }
        }

        .image-count {
            position: absolute;
            bottom: 8px;
            right: 8px;
            background: rgba(0, 0, 0, 0.6);
            color: white;
            padding: 4px 10px;
            border-radius: 12px;
            font-size: 0.8rem;
            display: flex;
            align-items: center;
            gap: 4px;
        }

        .card-content {
            padding: 16px;
        }

        .card-tags {
            display: flex;
            flex-wrap: wrap;
            gap: 6px;
            margin-bottom: 12px;
        }

        .tag {
            padding: 4px 10px;
            background: #FFF0F0;
            color: var(--primary);
            border-radius: 12px;
            font-size: 0.75rem;
            font-weight: 500;
        }

        .card-title {
            font-size: 1rem;
            font-weight: 600;
            color: var(--text-primary);
            margin-bottom: 8px;
            line-height: 1.4;
            display: -webkit-box;
            -webkit-line-clamp: 2;
            -webkit-box-orient: vertical;
            overflow: hidden;
        }

        .card-description {
            font-size: 0.9rem;
            color: var(--text-secondary);
            margin-bottom: 12px;
            line-height: 1.5;
            display: -webkit-box;
            -webkit-line-clamp: 3;
            -webkit-box-orient: vertical;
            overflow: hidden;
        }

        .prompt-box {
            background: #F8F8F8;
            border-radius: 10px;
            padding: 12px;
            margin-bottom: 12px;
            max-height: 100px;
            overflow-y: auto;
            font-size: 0.85rem;
            line-height: 1.6;
            color: var(--text-primary);
            font-family: "SF Mono", "Monaco", "Inconsolata", monospace;
        }

        .prompt-box::-webkit-scrollbar {
            width: 4px;
        }

        .prompt-box::-webkit-scrollbar-thumb {
            background: #ddd;
            border-radius: 2px;
        }

        .card-actions {
            display: flex;
            gap: 8px;
        }

        .btn {
            flex: 1;
            padding: 10px 16px;
            border: none;
            border-radius: 20px;
            font-size: 0.9rem;
            font-weight: 500;
            cursor: pointer;
            transition: all 0.2s ease;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 6px;
        }

        .btn-copy {
            background: var(--primary);
            color: white;
        }

        .btn-copy:hover {
            background: #ff5252;
        }

        .btn-copy:active {
            transform: scale(0.95);
        }

        .btn-copy.success {
            background: var(--success);
        }

        .btn-favorite {
            background: #FFF5F5;
            color: var(--primary);
            flex: 0 0 auto;
            padding: 10px 14px;
        }

        .btn-favorite:hover {
            background: #FFE5E5;
        }

        .btn-favorite.active {
            background: var(--primary);
            color: white;
        }

        /* ============================
           Toast Notification
           ============================ */
        .toast {
            position: fixed;
            bottom: 30px;
            left: 50%;
            transform: translateX(-50%) translateY(100px);
            background: var(--success);
            color: white;
            padding: 14px 28px;
            border-radius: 25px;
            font-size: 1rem;
            font-weight: 500;
            box-shadow: 0 4px 20px rgba(0, 0, 0, 0.2);
            z-index: 1000;
            opacity: 0;
            transition: all 0.3s ease;
            display: flex;
            align-items: center;
            gap: 8px;
        }

        .toast.show {
            transform: translateX(-50%) translateY(0);
            opacity: 1;
        }

        .toast.error {
            background: #FF6B6B;
        }

        /* ============================
           Empty State
           ============================ */
        .empty-state {
            text-align: center;
            padding: 60px 20px;
            color: var(--text-secondary);
        }

        .empty-state-icon {
            font-size: 4rem;
            margin-bottom: 16px;
        }

        .empty-state-text {
            font-size: 1.2rem;
        }

        /* ============================
           Footer
           ============================ */
        .footer {
            text-align: center;
            padding: 40px 20px;
            color: var(--text-secondary);
            font-size: 0.9rem;
        }

        .footer a {
            color: var(--primary);
            text-decoration: none;
        }

        /* ============================
           Responsive
           ============================ */
        @media (max-width: 600px) {
            .header-content {
                flex-direction: column;
                align-items: stretch;
            }

            .search-box {
                max-width: 100%;
            }

            .logo {
                justify-content: center;
            }
        }
    </style>
</head>
<body>
    <!-- Header -->
    <header class="header">
        <div class="header-content">
            <div class="logo">
                <span class="logo-icon">🍌</span>
                <span>Nano Banana Pro Prompts</span>
            </div>
            <div class="search-box">
                <input type="text" class="search-input" id="searchInput" placeholder="🔍 搜索 Prompts...">
                <select class="filter-select" id="languageFilter">
                    <option value="all">全部语言</option>
                    <option value="ZH">中文</option>
                    <option value="EN">English</option>
                    <option value="JA">日本語</option>
                    <option value="DE">Deutsch</option>
                </select>
            </div>
        </div>
    </header>

    <!-- Main Content -->
    <main class="main">
        <div class="masonry" id="promptsGrid"></div>
        <div class="empty-state" id="emptyState" style="display: none;">
            <div class="empty-state-icon">🔍</div>
            <p class="empty-state-text">没有找到相关 Prompts</p>
        </div>
    </main>

    <!-- Footer -->
    <footer class="footer">
        <p>数据来源: <a href="https://github.com/YouMind-OpenLab/awesome-nano-banana-pro-prompts" target="_blank">awesome-nano-banana-pro-prompts</a></p>
        <p style="margin-top: 8px;">由 AI 整理 | 仅供学习使用</p>
    </footer>

    <!-- Toast -->
    <div class="toast" id="toast"></div>

    <script src="data.js"></script>
    <script>
        // State
        let favorites = JSON.parse(localStorage.getItem('nanoPromptFavorites') || '[]');

        // DOM Elements
        const grid = document.getElementById('promptsGrid');
        const searchInput = document.getElementById('searchInput');
        const languageFilter = document.getElementById('languageFilter');
        const emptyState = document.getElementById('emptyState');
        const toast = document.getElementById('toast');

        // Language labels
        const langLabels = {
            'ZH': '🇨🇳 中文',
            'EN': '🇺🇸 English',
            'JA': '🇯🇵 日本語',
            'DE': '🇩🇪 Deutsch'
        };

        // Show toast notification
        function showToast(message, isError = false) {
            toast.textContent = message;
            toast.className = 'toast' + (isError ? ' error' : '');
            toast.classList.add('show');
            setTimeout(() => {
                toast.classList.remove('show');
            }, 2000);
        }

        // Copy prompt to clipboard
        async function copyPrompt(prompt, btn) {
            try {
                await navigator.clipboard.writeText(prompt);
                btn.innerHTML = '✓ 已复制';
                btn.classList.add('success');
                showToast('已复制到剪贴板 ✨');
                setTimeout(() => {
                    btn.innerHTML = '📋 复制';
                    btn.classList.remove('success');
                }, 2000);
            } catch (err) {
                showToast('复制失败，请手动选择', true);
            }
        }

        // Toggle favorite
        function toggleFavorite(id, btn) {
            const index = favorites.indexOf(id);
            if (index > -1) {
                favorites.splice(index, 1);
                btn.classList.remove('active');
            } else {
                favorites.push(id);
                btn.classList.add('active');
                showToast('已添加到收藏 💜');
            }
            localStorage.setItem('nanoPromptFavorites', JSON.stringify(favorites));
        }

        // Create card HTML
        function createCard(prompt) {
            const isFavorite = favorites.includes(prompt.id);
            const firstImage = prompt.images[0];
            const imageCount = prompt.images.length;

            return `
                <article class="card">
                    <div class="card-image-wrapper">
                        <img 
                            class="card-image" 
                            data-src="${firstImage}" 
                            alt="${prompt.title}"
                            loading="lazy"
                        >
                        <div class="card-image-skeleton"></div>
                        ${imageCount > 1 ? `
                            <div class="image-count">
                                <span>📷</span>
                                <span>${imageCount}</span>
                            </div>
                        ` : ''}
                    </div>
                    <div class="card-content">
                        <div class="card-tags">
                            ${prompt.tags.map(tag => `<span class="tag">#${tag}</span>`).join('')}
                            <span class="tag">${langLabels[prompt.language] || prompt.language}</span>
                        </div>
                        <h3 class="card-title">${prompt.title}</h3>
                        <p class="card-description">${prompt.description}</p>
                        <div class="prompt-box">${prompt.prompt}</div>
                        <div class="card-actions">
                            <button class="btn btn-copy" onclick="copyPrompt(\`${prompt.prompt.replace(/`/g, '\\`').replace(/\$/g, '\\$')}\`, this)">
                                📋 复制
                            </button>
                            <button class="btn btn-favorite ${isFavorite ? 'active' : ''}" onclick="toggleFavorite(${prompt.id}, this)">
                                ${isFavorite ? '❤️' : '🤍'}
                            </button>
                        </div>
                    </div>
                </article>
            `;
        }

        // Render prompts
        function renderPrompts() {
            const searchTerm = searchInput.value.toLowerCase();
            const language = languageFilter.value;

            const filtered = prompts.filter(prompt => {
                const matchesSearch = 
                    prompt.title.toLowerCase().includes(searchTerm) ||
                    prompt.description.toLowerCase().includes(searchTerm) ||
                    prompt.prompt.toLowerCase().includes(searchTerm);
                const matchesLanguage = language === 'all' || prompt.language === language;
                return matchesSearch && matchesLanguage;
            });

            if (filtered.length === 0) {
                grid.innerHTML = '';
                emptyState.style.display = 'block';
            } else {
                emptyState.style.display = 'none';
                grid.innerHTML = filtered.map(createCard).join('');
                
                // Setup lazy loading for images
                document.querySelectorAll('.card-image').forEach(img => {
                    img.onload = () => img.classList.add('loaded');
                    img.onerror = () => {
                        img.src = 'data:image/svg+xml,<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 200 200"><rect fill="%23f0f0f0" width="200" height="200"/><text x="50%" y="50%" dominant-baseline="middle" text-anchor="middle" fill="%23999" font-size="14">图片加载失败</text></svg>';
                        img.classList.add('loaded');
                    };
                    // Trigger load if already cached
                    if (img.complete) {
                        img.classList.add('loaded');
                    }
                });
            }
        }

        // Debounce function
        function debounce(func, wait) {
            let timeout;
            return function executedFunction(...args) {
                const later = () => {
                    clearTimeout(timeout);
                    func(...args);
                };
                clearTimeout(timeout);
                timeout = setTimeout(later, wait);
            };
        }

        // Event listeners
        searchInput.addEventListener('input', debounce(renderPrompts, 300));
        languageFilter.addEventListener('change', renderPrompts);

        // Initial render
        renderPrompts();
    </script>
</body>
</html>
